# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.
# See also https://symfony.com/doc/current/service_container/import.html

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    app.media_directory: '%kernel.project_dir%/public/media'
    avatars_directory: '%kernel.project_dir%/public/media/avatars'
    covers_directory: '%kernel.project_dir%/public/media/covers'

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones
    
    # Bind project directory for services that need it
    App\MessageHandler\ProcessVideoEncodingMessageHandler:
        arguments:
            $projectDir: '%kernel.project_dir%'
    
    App\Service\NotificationService:
        arguments:
            $fromEmail: '%env(MAILER_FROM)%'
    
    App\Command\GenerateVideoPreviewsCommand:
        arguments:
            $projectDir: '%kernel.project_dir%'
    
    App\Service\ImageService:
        arguments:
            $avatarsDirectory: '%avatars_directory%'
            $coversDirectory: '%covers_directory%'
    
    # Rate limiter factories - алиасы для autowiring
    Symfony\Component\RateLimiter\RateLimiterFactory $loginAttemptsLimiter: '@limiter.login_attempts'
    Symfony\Component\RateLimiter\RateLimiterFactory $registrationLimiter: '@limiter.registration'
    Symfony\Component\RateLimiter\RateLimiterFactory $videoUploadLimiter: '@limiter.video_upload'
    Symfony\Component\RateLimiter\RateLimiterFactory $searchLimiter: '@limiter.search'
    Symfony\Component\RateLimiter\RateLimiterFactory $commentPostLimiter: '@limiter.comment_post'
    Symfony\Component\RateLimiter\RateLimiterFactory $adminActionsLimiter: '@limiter.admin_actions'
    
    # File system service
    Symfony\Component\Filesystem\Filesystem: ~
